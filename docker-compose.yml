version: "3"
services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    ports:
      - 53:53/tcp
      - 53:53/udp
      - 67:67/udp
      - ${HTTPPORT}:80/tcp
      - ${HTTPSPORT}:443/tcp
    environment:
      - PIHOLE_DNS_=${DOHINTERNALIP}#5053
      - ServerIP=${HOSTIP}
      - DNSSEC=true
      - REV_SERVER=true
      - REV_SERVER_DOMAIN=lan
      - 'REV_SERVER_CIDR=192.168.10.0/24'
    volumes:
      - /etc/pihole/config:/etc/pihole
      - /etc/pihole/dnsmasq:/etc/dnsmasq.d
      - /etc/localtime:/etc/localtime:ro
    dns:
      - 127.0.0.1
    networks:
      default:
        ipv4_address: ${PIHOLEINTERNALIP}
    restart: unless-stopped

  cloudflared:
    image: crazymax/cloudflared:latest
    container_name: cloudflared
    hostname: cloudflared
    ports:
      - 5053:5053/udp
      - 5053:5053/tcp
    environment:
      - TUNNEL_DNS_UPSTREAM=https://${EXTERNALDNS1}/dns-query,https://${EXTERNALDNS2}/dns-query
    volumes:
      - /etc/localtime:/etc/localtime:ro
    networks:
      default:
        ipv4_address: ${DOHINTERNALIP}
    restart: unless-stopped

networks:
  default:
    external:
      name: ${NETWORKNAME}
